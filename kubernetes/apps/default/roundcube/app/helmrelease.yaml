---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundcube
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m0s
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      roundcube:
        containers:
          app:
            image:
              repository: docker.io/roundcube/roundcubemail
              tag: 1.7.1-apache-nonroot@sha256:18299293253ebd865325fc1c851d31fbe249495b87f128676ec2c7839be26c5a
            env:
              - name: ROUNDCUBEMAIL_DB_TYPE
                value: sqlite
              - name: ROUNDCUBEMAIL_PLUGINS
                value: archive
              - name: ROUNDCUBEMAIL_SKIN
                value: elastic
              - name: ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
                value: 25M
              - name: TZ
                value: Americas/Los_Angeles
              - name: ROUNDCUBEMAIL_DEFAULT_HOST
                valueFrom:
                  secretKeyRef:
                    name: roundcube
                    key: ROUNDCUBEMAIL_DEFAULT_HOST
              - name: ROUNDCUBEMAIL_DEFAULT_PORT
                valueFrom:
                  secretKeyRef:
                    name: roundcube
                    key: ROUNDCUBEMAIL_DEFAULT_PORT
              - name: ROUNDCUBEMAIL_SMTP_SERVER
                valueFrom:
                  secretKeyRef:
                    name: roundcube
                    key: ROUNDCUBEMAIL_SMTP_SERVER
              - name: ROUNDCUBEMAIL_SMTP_PORT
                valueFrom:
                  secretKeyRef:
                    name: roundcube
                    key: ROUNDCUBEMAIL_SMTP_PORT
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "mail.dot-hex.xyz"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /var/roundcube
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /var/www/html
            subPath: html
          - path: /var/run
            subPath: run
          - path: /tmp
            subPath: tmp