---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundcube
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m0s
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      roundcube:
        containers:
          app:
            image:
              repository: docker.io/roundcube/roundcubemail
              tag: 1.6.15-fpm-alpine-nonroot@sha256:3501dda36b4e24712a5e23e9f04d11ad65e2f786984e64cc94ca7538aa902cff
            env:
              - name: ROUNDCUBEMAIL_DB_TYPE
                value: sqlite
              - name: ROUNDCUBEMAIL_PLUGINS
                value: archive
              - name: ROUNDCUBEMAIL_SKIN
                value: elastic
              - name: ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
                value: 25M
              - name: TZ
                value: Americas/Los_Angeles
              - name: ROUNDCUBEMAIL_DEFAULT_HOST
                valueFrom:
                  secretKeyRef:
                    name: roundcube
                    key: ROUNDCUBEMAIL_DEFAULT_HOST
              - name: ROUNDCUBEMAIL_DEFAULT_PORT
                valueFrom:
                  secretKeyRef:
                    name: roundcube
                    key: ROUNDCUBEMAIL_DEFAULT_PORT
              - name: ROUNDCUBEMAIL_SMTP_SERVER
                valueFrom:
                  secretKeyRef:
                    name: roundcube
                    key: ROUNDCUBEMAIL_SMTP_SERVER
              - name: ROUNDCUBEMAIL_SMTP_PORT
                valueFrom:
                  secretKeyRef:
                    name: roundcube
                    key: ROUNDCUBEMAIL_SMTP_PORT
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              seccompProfile: {type: RuntimeDefault}
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "mail.dot-hex.xyz"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /var/roundcube
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /var/www/html
            subPath: html
          - path: /var/run
            subPath: run
          - path: /tmp
            subPath: tmp