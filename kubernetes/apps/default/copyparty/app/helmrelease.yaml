---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app copyparty
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m0s
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/9001/copyparty-ac
              tag: 1.20.13@sha256:059c7e2c75a4d2402ccc23febc281b87dc80ec2ba2dcb23de1f666f0b33b9b74
            env:
              TZ: Americas/Los_Angeles
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
          seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: &port 3923
    route:
      app:
        hostnames:
          - "copy.dot-hex.xyz"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /cfg/
      copyparty:
        enabled: true
        type: secret
        name: copyparty-config
        globalMounts:
        - path: /cfg/copyparty.conf
      tmp:
        type: emptyDir
        globalMounts:
          - path: /w
      media:
        globalMounts:
        - path: /w/media
        path: /mnt/main/media
        server: nas.dot-hex.xyz
        type: nfs
      manga:
        enabled: true
        globalMounts:
        - path: /w/manga
        path: /mnt/main/manga-share
        server: nas.dot-hex.xyz
        type: nfs
